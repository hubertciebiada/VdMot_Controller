; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = STM32_release_C1, STM32_release_C2

[version]
firmware_version = '"1.4.9"'
firmware_version_dev = '"1.4.9_Dev"'
hardware_version_c1 = '"C1"'
hardware_version_c2 = '"C2"'

; deploy branch policy (mirrors software_esp32/platformio.ini): platform and every
; lib_deps entry pinned to the exact version that builds, so CI is reproducible on
; any machine. Do not use ^ranges or bare GitHub URLs here.
; ststm32@19.7.0 pulls framework-arduinoststm32 (STM32 core) + the arm-none-eabi
; gcc toolchain; STM32_release_C2 links at ~20 % of the 256 KB F401 flash.
[env]
platform = ststm32@19.7.0
framework = arduino
debug_tool = jlink
upload_protocol = jlink
build_flags =
	-O2 -Wl,-Map,output.map
debug_build_flags = -O0 -g -ggdb
lib_deps =
	neu-rah/ArduinoMenu library@4.21.5
	khoih-prog/STM32_TimerInterrupt@1.3.0
	bblanchon/ArduinoJson@6.21.6
	vermut/ModbusSerial@1.0.1
	paulstoffregen/OneWire@2.3.8
	robtillaart/I2C_EEPROM@1.9.4
	;robtillaart/DS2438@^0.1.1

[env:STM32_development_C1]
board = blackpill_f401cc
board_build.f_cpu = 100000000L
build_flags = 
	-DFIRMWARE_VERSION=${version.firmware_version_dev}
	-DHARDWARE_VERSION=${version.hardware_version_C1}
	-DHARDWARE_REVISION_C1
	-DcommDebug
	-DappDebug
	;-DtempDebug
	;-DmotDebug

[env:STM32_development_C2]
board = blackpill_f401cc
build_flags = 
	-DFIRMWARE_VERSION=${version.firmware_version_dev}
	-DHARDWARE_VERSION=${version.hardware_version_C2}
	-DHARDWARE_REVISION_C2
	-DcommDebug
	-DappDebug
	;-DtempDebug
	;-DmotDebug

[env:STM32_release_C1]
board = blackpill_f401cc
build_flags = 
	-DFIRMWARE_VERSION=${version.firmware_version}
	-DFIRMWARE_BUILD='"1"'
	-DHARDWARE_VERSION=${version.hardware_version_C1}
	-DHARDWARE_REVISION_C1
	-DcommDebug
	-DappDebug
	

[env:STM32_release_C2]
board = blackpill_f401cc
build_flags = 
	-DFIRMWARE_VERSION=${version.firmware_version}
	-DFIRMWARE_BUILD='"1"'
	-DHARDWARE_VERSION=${version.hardware_version_C2}
	-DHARDWARE_REVISION_C2
	-DcommDebug
	-DappDebug

[env:STM32F411_development_C2]
board = blackpill_f411ce
board_build.mcu = stm32f411ceu6
board_build.f_cpu = 100000000L
build_flags = 
	-DFIRMWARE_VERSION=${version.firmware_version_dev}
	-DHARDWARE_VERSION=${version.hardware_version_C2}
	-DHARDWARE_REVISION_C2
	-DcommDebug
	-DappDebug

[env:STM32F411_development_C1]
board = blackpill_f411ce
board_build.mcu = stm32f411ceu6
board_build.f_cpu = 100000000L
build_flags = 
	-DFIRMWARE_VERSION=${version.firmware_version_dev}
	-DHARDWARE_VERSION=${version.hardware_version_C1}
	-DHARDWARE_REVISION_C1
	-DcommDebug
	-DappDebug

