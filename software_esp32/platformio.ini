; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[common]
firmware_version = '"1.4.12+hc2"'
firmware_version_dev = '"1.4.12+hc2_Dev"'
minFirmwareSTMRequired = '"1.4.0"'

; hc-version branch policy: base = upstream/developer (SurfGargano's active release
; line, 1.4.12+ — NOT master, which lags at ~1.4.10). My fixes + build-config are
; cherry-picked on top, and EVERYTHING pinned to exact versions so the build is
; reproducible on any machine (incl. CI). Do not use ^ranges or bare GitHub URLs.
; Keep current with: git checkout hc-version && git merge upstream/developer
[env]
platform = espressif32@6.1.0
framework = arduino
monitor_port = COM4
monitor_speed = 115200
upload_port = COM4
upload_speed = 115200
;board_build.partitions = myPartitions.csv
lib_deps =
	bblanchon/ArduinoJson@6.21.6
	arcao/Syslog@2.0.0
	knolleary/PubSubClient@2.8
	tcmenu/TaskManagerIO@1.5.4
	khoih-prog/AsyncWebServer_WT32_ETH01@1.6.2
	me-no-dev/AsyncTCP@1.1.1
	bakercp/CRC32@2.0.1
	mobizt/ESP Mail Client@3.4.24


[env:wt32-eth01_dev]
board = wt32-eth01

; change microcontroller
board_build.mcu = esp32

; change MCU frequency
board_build.f_cpu = 240000000L

build_flags = 
	-O2
	-DFIRMWARE_VERSION=${common.firmware_version_dev}
	-DFIRMWARE_BUILD
	;-DnetDebug
	;-DnetDebugWIFI
	-DOTADebug
	;-DAppDebug
	;-DnetUseMDNS
	-DEnvDevelop
	;-DEnvDevelop_Level1
	;-DuseRS485
	;-DuseCAN
	-DUSE_LittleFS	
	-DDYNAMIC_JSON_DOCUMENT_SIZE=4096
	-DminSTMRequired=${common.minFirmwareSTMRequired}

[env:wt32-eth01_release]
board = wt32-eth01

; change microcontroller
board_build.mcu = esp32

; change MCU frequency
board_build.f_cpu = 240000000L

build_flags =
	-O2
	-DFIRMWARE_VERSION=${common.firmware_version}
	-DUSE_LittleFS
	-DDYNAMIC_JSON_DOCUMENT_SIZE=4096
	-DminSTMRequired=${common.minFirmwareSTMRequired}
	-DDISABLE_IMAP
	-DDISABLE_SD
	-DNO_MESSENGER


	


